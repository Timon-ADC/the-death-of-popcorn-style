<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'/>
  <meta name='viewport' content='width=device-width,initial-scale=1.0'/>
  <title>ADC Talk Order Generator</title>
  <script src='https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js'></script>
  <script src='https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js'></script>
  <style>
    :root{
      --bg:#1A1A1A;--card:#2D2D2D;--card2:#383838;--border:#444;
      --purple:#A187FF;--teal:#2BEBCB;--green:#58EB81;
      --yellow:#FFF347;--gold:#E5C574;--white:#FFF;--grey:#ADADAD;--pink:#FF9BFC;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;
         display:flex;flex-direction:column;align-items:center;
         padding:20px 16px 40px;color:var(--white);}
    h1{font-size:1.5rem;color:var(--purple);margin-bottom:4px;text-align:center;
       letter-spacing:1px;font-weight:800;}
    .subtitle{font-size:.82rem;color:var(--grey);text-align:center;margin-bottom:18px;}
    .elmo-wrapper{display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
    .speech-bubble{background:var(--card);border:2px solid var(--purple);border-radius:16px;
      padding:11px 16px;max-width:280px;font-size:.88rem;color:var(--white);text-align:center;
      position:relative;margin-bottom:10px;line-height:1.45;min-height:50px;transition:opacity .15s;}
    .speech-bubble::after{content:'';position:absolute;bottom:-13px;left:50%;
      transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--purple);}
    .speech-bubble::before{content:'';position:absolute;bottom:-8px;left:50%;
      transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--card);z-index:1;}
    .elmo-img{width:110px;height:110px;object-fit:contain;
      filter:drop-shadow(0 4px 14px rgba(161,135,255,.4));}
    .elmo-img.bounce{animation:bounce .55s ease;}
    .elmo-img.celebrate{animation:celebrate .72s ease infinite;}
    @keyframes bounce{0%{transform:translateY(0) rotate(0);}
      28%{transform:translateY(-18px) rotate(-7deg);}
      58%{transform:translateY(-6px) rotate(6deg);}
      100%{transform:translateY(0) rotate(0);}}
    @keyframes celebrate{
      0%{transform:translateY(0) rotate(-8deg) scale(1);}
      50%{transform:translateY(-14px) rotate(8deg) scale(1.08);}
      100%{transform:translateY(0) rotate(-8deg) scale(1);}}
    .card{background:var(--card);border-radius:20px;border:1px solid var(--border);
          padding:22px 18px;width:100%;max-width:420px;}
    .card-title{font-size:.95rem;font-weight:700;color:var(--teal);margin-bottom:12px;text-align:center;}
    .members-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
    .member-btn{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:12px;
      border:2px solid var(--border);background:var(--card2);cursor:pointer;font-size:.88rem;
      font-weight:500;color:var(--grey);transition:all .18s;user-select:none;width:100%;}
    .member-btn.selected{border-color:var(--purple);background:rgba(161,135,255,.13);color:var(--white);}
    .avatar{width:30px;height:30px;border-radius:50%;background:var(--border);display:flex;
      align-items:center;justify-content:center;font-size:.74rem;font-weight:700;
      color:var(--grey);flex-shrink:0;transition:all .18s;}
    .member-btn.selected .avatar{background:var(--purple);color:#111;}
    .checkmark{margin-left:auto;opacity:0;color:var(--teal);font-size:.95rem;transition:opacity .18s;}
    .member-btn.selected .checkmark{opacity:1;}
    .btn-row{display:flex;gap:9px;margin-bottom:9px;}
    .btn{flex:1;padding:12px 8px;border-radius:12px;border:none;font-size:.92rem;font-weight:700;
         cursor:pointer;transition:transform .13s,filter .13s;}
    .btn:active{transform:scale(.95);}
    .btn-yellow{background:var(--yellow);color:#111;}  .btn-yellow:hover{filter:brightness(1.08);}
    .btn-teal{background:var(--teal);color:#111;}      .btn-teal:hover{filter:brightness(1.08);}
    .btn-purple{background:var(--purple);color:#111;}  .btn-purple:hover{filter:brightness(1.08);}
    .btn-secondary{background:var(--card2);color:var(--grey);border:1px solid var(--border);}
    .btn-secondary:hover{background:#484848;color:var(--white);}
    .btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;filter:none!important;}
    .select-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
    .btn-tiny{padding:5px 10px;border-radius:8px;border:1px solid var(--border);font-size:.76rem;
              font-weight:600;cursor:pointer;background:var(--card2);color:var(--grey);transition:all .13s;}
    .btn-tiny:hover{background:#484848;color:var(--white);}
    .counter-label{margin-left:auto;font-size:.76rem;color:var(--grey);}
    .share-box{background:rgba(43,235,203,.07);border:1.5px solid var(--teal);
               border-radius:16px;padding:18px;text-align:center;margin-bottom:14px;}
    .session-code{font-family:monospace;font-size:2.4rem;font-weight:900;color:var(--teal);
                  letter-spacing:6px;margin:6px 0;}
    .share-label{font-size:.76rem;color:var(--grey);margin-bottom:6px;}
    .qr-img{width:160px;height:160px;border-radius:10px;margin:10px auto;display:block;
            border:3px solid var(--teal);}
    .copy-row{display:flex;gap:8px;margin-top:10px;}
